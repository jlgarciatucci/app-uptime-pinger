name: Keep Streamlit apps awake

on:
  schedule:
    # Every 6 hours, UTC
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Streamlit apps
        env:
          APP_URLS: ${{ secrets.APP_URLS }}
        run: |
          echo "$APP_URLS" | while read -r url; do
            [ -z "$url" ] && continue
            echo "Pinging $url"
            curl -L --max-time 60 --retry 2 --retry-delay 10 "$url" > /dev/null || true
          done
